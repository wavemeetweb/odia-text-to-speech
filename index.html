<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odia Speech Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top right, #141129 0%, #050508 100%);
            min-height: 100vh;
        }
        .cyber-panel {
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .cyber-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cyber-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.18);
            transform: translateY(-1px);
        }
        .cyber-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 text-slate-100">

    <div class="w-full max-w-2xl p-8 rounded-2xl cyber-panel shadow-2xl">
        <div class="text-[10px] font-bold tracking-[0.25em] text-cyan-400 uppercase mb-2">
            Sarwam Indic Core
        </div>

        <div class="mb-6">
            <h1 class="text-3xl font-medium tracking-tight text-slate-200">
                ଓଡ଼ିଆ <span class="text-slate-500 font-light">Engine</span>
            </h1>
            <p class="text-xs text-slate-500 mt-1">Low-latency localized speech infrastructure</p>
        </div>

        <div class="relative mb-6 rounded-xl bg-black/50 border border-white/5 p-5">
            <textarea 
                id="text-area" 
                class="w-full h-44 bg-transparent text-slate-200 placeholder-slate-600 focus:outline-none resize-none font-light text-lg italic leading-relaxed"
                placeholder="Initiate voice sequence..."
                readonly
            ></textarea>
            
            <div class="flex justify-end mt-2">
                <span id="status-indicator" class="text-[10px] font-bold tracking-widest text-slate-600 uppercase transition-all duration-300">
                    System Ready
                </span>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <button id="listen-btn" class="cyber-btn py-3 px-6 rounded-xl font-medium text-sm tracking-wide text-slate-300 outline-none">
                Listen
            </button>
            <button id="copy-btn" class="cyber-btn py-3 px-6 rounded-xl font-medium text-sm tracking-wide text-slate-400 outline-none">
                Copy
            </button>
            <button id="clear-btn" class="cyber-btn py-3 px-6 rounded-xl font-medium text-sm tracking-wide text-slate-500 outline-none">
                Clear
            </button>
        </div>
    </div>

    <script type="module" src="src/app.js"></script>
</body>
</html>
