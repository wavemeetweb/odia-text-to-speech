<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ଓଡ଼ିଆ ଫ୍ରି Voice-to-Text (Dark Mode)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* Dark Mode Background */
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .app-card {
            background-color: #1e1e1e; /* Deep Card Background */
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 550px;
            text-align: center;
            border-top: 5px solid #ff9933; /* Neon Orange Top Border */
        }
        h1 {
            color: #ffffff;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 5px;
        }
        .sub-title {
            font-size: 14px;
            color: #a0aec0;
            margin-bottom: 20px;
        }
        #output-box {
            width: 100%;
            height: 220px;
            border: 2px solid #333333;
            border-radius: 10px;
            padding: 14px;
            font-size: 18px;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 20px;
            background-color: #2d2d2d; /* Dark Input Field */
            color: #ffffff;
            transition: border-color 0.2s;
        }
        #output-box:focus {
            border-color: #ff9933;
            outline: none;
        }
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .btn-start { background-color: #10b981; color: #ffffff; } /* Electric Green */
        .btn-start:hover { background-color: #059669; }
        .btn-start:disabled { background-color: #4a5568; color: #a0aec0; cursor: not-allowed; }
        
        .btn-stop { background-color: #ef4444; color: #ffffff; } /* Crimson Red */
        .btn-stop:hover { background-color: #dc2626; }
        .btn-stop:disabled { background-color: #4a5568; color: #a0aec0; cursor: not-allowed; }
        
        .btn-copy { background-color: #3b82f6; color: #ffffff; } /* Bright Blue */
        .btn-copy:hover { background-color: #2563eb; }
        
        .status-text {
            margin-top: 18px;
            font-size: 13px;
            color: #a0aec0;
            font-weight: 500;
        }
        .info-tag {
            background-color: #2a3441; /* Muted Blue-Gray Tag */
            color: #93c5fd;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 15px;
            line-height: 1.4;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sanscript@1.0.0/sanscript.min.js"></script>
</head>
<body>

<div class="app-card">
    <h1>ଓଡ଼ିଆ Voice to Text</h1>
    <div class="sub-title">100% Free Public Utility App</div>
    
    <div class="info-tag">💡 Speak or type in English spellings (like 'namaskar') to generate Odia script!</div>
    
    <textarea id="output-box" placeholder="ଏଠାରେ କ୍ଲିକ୍ କରି କୁହନ୍ତୁ କିମ୍ବା ଟାଇପ୍ କରନ୍ତୁ..."></textarea>
    
    <div class="actions">
        <button class="btn-start" id="start-btn">Start Mic</button>
        <button class="btn-stop" id="stop-btn" disabled>Stop Mic</button>
        <button class="btn-copy" id="copy-btn">Copy Text</button>
    </div>
    
    <div class="status-text" id="status">Ready. Click 'Start Mic'.</div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const copyBtn = document.getElementById('copy-btn');
    const outputBox = document.getElementById('output-box');
    const status = document.getElementById('status');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let finalCommittedText = ""; 

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'hi-IN'; 

        recognition.onstart = () => {
            status.textContent = "🎙️ Listening... Please speak your Odia words clearly.";
            startBtn.disabled = true;
            stopBtn.disabled = false;
            finalCommittedText = outputBox.value; 
        };

        recognition.onerror = (e) => {
            status.textContent = "Status: Listening paused.";
            stopBtn.click();
        };

        recognition.onend = () => {
            status.textContent = "Mic turned off.";
            startBtn.disabled = false;
            stopBtn.disabled = true;
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            let newFinalText = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                let textChunk = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    newFinalText += textChunk;
                } else {
                    interimTranscript += textChunk;
                }
            }

            if (newFinalText !== '') {
                let cleanFinal = processSentenceToOdia(newFinalText);
                finalCommittedText += cleanFinal + " ";
            }

            let cleanInterim = processSentenceToOdia(interimTranscript);
            outputBox.value = finalCommittedText + cleanInterim;
        };
    } else {
        status.textContent = "Voice input requires Google Chrome or Microsoft Edge.";
    }

    function processSentenceToOdia(sentence) {
        if (!sentence) return "";
        let tokens = sentence.split(/\s+/);
        let convertedTokens = tokens.map(token => convertWordToOdia(token));
        return convertedTokens.join(" ");
    }

    function convertWordToOdia(word) {
        if (!word) return "";
        if (/[\u0B00-\u0B7F]/.test(word)) {
            return word;
        }

        let cleanWord = word.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g,"").trim();
        if (!cleanWord) return "";

        let workingText = cleanWord
            .replace(/sh/g, 'ś')
            .replace(/ch/g, 'c')
            .replace(/ee/g, 'ī')
            .replace(/oo/g, 'ū')
            .replace(/aa/g, 'ā')
            .replace(/o/g, 'a');

        try {
            return Sanscript.t(workingText, 'itrans', 'oriya');
        } catch(err) {
            return word; 
        }
    }

    // Fixed typing system configuration
    outputBox.addEventListener('keydown', (e) => {
        if (e.key === ' ') {
            let cursorPosition = outputBox.selectionStart;
            let currentText = outputBox.value;

            let textBeforeCursor = currentText.substring(0, cursorPosition);
            let tokens = textBeforeCursor.split(/\s+/);
            let lastToken = tokens[tokens.length - 1];

            if (/^[a-zA-Z]+$/.test(lastToken.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g,""))) {
                let convertedWord = convertWordToOdia(lastToken);
                
                let startOfWordIdx = textBeforeCursor.lastIndexOf(lastToken);
                let updatedTextBefore = currentText.substring(0, startOfWordIdx) + convertedWord;
                let textAfterCursor = currentText.substring(cursorPosition);

                e.preventDefault(); 
                outputBox.value = updatedTextBefore + " " + textAfterCursor;
                let newCursorPos = updatedTextBefore.length + 1;
                outputBox.setSelectionRange(newCursorPos, newCursorPos);
            }
        }
    });

    startBtn.addEventListener('click', () => {
        if(recognition) recognition.start();
    });

    stopBtn.addEventListener('click', () => {
        if(recognition) recognition.stop();
    });

    copyBtn.addEventListener('click', () => {
        outputBox.select();
        navigator.clipboard.writeText(outputBox.value);
        const originalStatus = status.textContent;
        status.textContent = "Copied to clipboard! 📋";
        setTimeout(() => status.textContent = originalStatus, 2000);
    });
</script>

</body>
</html>
