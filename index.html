<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice to Text Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-container">
        <header class="app-header">
            <h1 class="app-title">Speech to Text Engine</h1>
            <p class="app-subtitle">Real-time voice recognition & phrase correction</p>
        </header>

        <section class="display-workspace">
            <div id="outputCanvas" class="output-canvas"></div>
        </section>
        
        <footer class="controls-workspace">
            <button id="toggleRecordBtn" class="btn btn-primary" data-state="idle">
                <span class="btn-icon"></span>
                <span class="btn-text">Start Listening</span>
            </button>
            <button id="clearCanvasBtn" class="btn btn-secondary">
                Clear Text
            </button>
        </footer>
    </main>

    <script type="module" src="src/app.js"></script>
</body>
</html>
